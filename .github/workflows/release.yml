# =============================================================================
# OVC — CI/CD Pipeline & Release
# =============================================================================
# Runs on every push/PR to main. Builds release binaries on version tags.
# Tag a release with: git tag v0.1.0 && git push --tags

name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Build frontend (needed by rust-embed in ovc-api)
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-release
          path: frontend/dist/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Lint, test, audit
  # ---------------------------------------------------------------------------
  check:
    name: Check & Test
    needs: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-release
          path: frontend/dist/

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check --all

      - name: Clippy lints
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Security audit
        run: cargo audit --ignore RUSTSEC-2023-0089 --ignore RUSTSEC-2023-0071

  # ---------------------------------------------------------------------------
  # Cross-compile native binaries for all supported platforms
  # ---------------------------------------------------------------------------
  binaries:
    name: Build binary (${{ matrix.artifact }})
    needs: [check, frontend]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ovc-linux-amd64
            use_cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ovc-linux-arm64
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: ovc-darwin-amd64
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: ovc-darwin-arm64
            use_cross: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-release
          path: frontend/dist/

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --locked -p ovc-cli --target ${{ matrix.target }}

      - name: Build (cargo)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --locked -p ovc-cli --target ${{ matrix.target }}

      - name: Sign macOS binary
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE_B64: ${{ secrets.APPLE_CERTIFICATE_B64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Decode certificate
          echo "$APPLE_CERTIFICATE_B64" | base64 --decode > /tmp/certificate.p12

          # Create temporary keychain
          KEYCHAIN_PATH="/tmp/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          security import /tmp/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Find signing identity
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | awk -F'"' '{print $2}')
          echo "Signing with: $IDENTITY"

          # Sign the binary
          codesign --force --options runtime --sign "$IDENTITY" \
            --timestamp "target/${{ matrix.target }}/release/ovc"

          # Create zip for notarization
          ditto -c -k "target/${{ matrix.target }}/release/ovc" /tmp/ovc-notarize.zip

          # Submit for notarization
          xcrun notarytool submit /tmp/ovc-notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          # Cleanup
          security delete-keychain "$KEYCHAIN_PATH"
          rm -f /tmp/certificate.p12 /tmp/ovc-notarize.zip

      - name: Rename binary
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/ovc"
          cp "$src" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # ---------------------------------------------------------------------------
  # Create GitHub Release with binaries and SHA256 checksums
  # ---------------------------------------------------------------------------
  release:
    name: GitHub Release
    needs: binaries
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: ovc-*
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd artifacts
          sha256sum ovc-* > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
